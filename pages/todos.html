<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>To-Do – FamCal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/weather.css">
<style>
.todo-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;margin-left:auto;flex-shrink:0}
.member-select-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:8px 8px 4px;border-bottom:1px solid rgba(255,255,255,0.08)}
.member-select-row::-webkit-scrollbar{display:none}
.ms-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:700;background:rgba(255,255,255,0.08);border:1.5px solid transparent;color:rgba(255,255,255,0.6);white-space:nowrap;flex-shrink:0;transition:all .15s;cursor:pointer}
.ms-btn.active{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.3);color:white}
.filter-tabs{display:flex;gap:6px;padding:8px 8px 4px}
.ftab{padding:5px 12px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,0.5);transition:all .15s}
.ftab.active{background:rgba(255,255,255,0.15);color:white}
</style>
</head>
<body class="weather-partly-cloudy">
<div id="weather-bg" class="weather-bg"><div class="weather-layer" id="weather-layer"></div><div class="weather-overlay"></div></div>
<header class="page-header">
  <a href="../index.html" class="back-btn">‹</a>
  <div class="page-title">✅ To-Do & Chores</div>
</header>
<div class="list-section" id="list-section"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/db.js"></script>
<script src="../js/weather.js"></script>
<script>
fetchWeather();
let selMember = 'all', showDone = false;

async function render() {
  let todos = await DB.getTodos();
  if (selMember !== 'all') todos = todos.filter(t => t.memberId === selMember);
  const open = todos.filter(t => !t.done);
  const done = todos.filter(t => t.done);
  const display = showDone ? done : open;
  const addMid = selMember === 'all' ? 'family' : selMember;
  const colorOverrides = JSON.parse(localStorage.getItem('fc_color_overrides') || '{}');
  FAMILY_MEMBERS.forEach(m => { if (colorOverrides[m.id]) m.color = colorOverrides[m.id]; });

  document.getElementById('list-section').innerHTML = `<div class="list-card">
    <div class="member-select-row">
      <button class="ms-btn ${selMember==='all'?'active':''}" onclick="setM('all')">Everyone</button>
      ${FAMILY_MEMBERS.filter(m=>m.id!=='family').map(m=>`
        <button class="ms-btn ${selMember===m.id?'active':''}" onclick="setM('${m.id}')"
          style="${selMember===m.id?'border-color:'+m.color:''}">
          <span style="width:10px;height:10px;border-radius:50%;background:${m.color};display:inline-block"></span>${m.name}
        </button>`).join('')}
    </div>
    <div class="filter-tabs">
      <div class="ftab ${!showDone?'active':''}" onclick="showDone=false;render()">Open (${(await DB.getTodos()).filter(t=>!t.done&&(selMember==='all'||t.memberId===selMember)).length})</div>
      <div class="ftab ${showDone?'active':''}" onclick="showDone=true;render()">Completed</div>
    </div>
    <div class="list-items">
      ${display.length === 0 ? `<div class="no-events" style="padding:20px">${showDone?'Nothing completed yet.':'All done! 🎉'}</div>` :
        display.map(t => {
          const m = getMember(t.memberId);
          return `<div class="list-item ${t.done?'checked':''}" onclick="tog('${t.id}')">
            <div class="list-check">${t.done?'✓':''}</div>
            <div class="list-item-text">${t.text}</div>
            <div class="todo-pill" style="background:${m.color}22;color:${m.color}">${m.initials}</div>
            <button onclick="event.stopPropagation();del('${t.id}')" style="font-size:13px;color:rgba(255,255,255,0.2);background:none;border:none;cursor:pointer;padding:3px 6px">✕</button>
          </div>`;
        }).join('')}
    </div>
    <div class="add-item-row">
      <input type="text" id="new-todo" class="add-item-input" placeholder="Add task..." onkeydown="if(event.key==='Enter')add()">
      <button class="add-item-btn" onclick="add()">+</button>
    </div>
  </div>`;
}

function setM(id) { selMember = id; render(); }
async function tog(id) { await DB.toggleTodo(id); await render(); }
async function del(id) { await DB.deleteTodo(id); await render(); }
async function add() {
  const inp = document.getElementById('new-todo');
  const text = inp.value.trim();
  if (!text) return;
  const mid = selMember === 'all' ? 'family' : selMember;
  await DB.addTodo(text, mid);
  inp.value = '';
  await render();
}

initRealtime(() => render());
render();
</script>
</body>
</html>
